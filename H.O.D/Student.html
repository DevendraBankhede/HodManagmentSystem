<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔹 Navbar -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold text-primary" href="index.html">HOD System</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto gap-3">
        <li class="nav-item"><a class="btn btn-primary" href="Student.html">Student Login</a></li>
        <li class="nav-item"><a class="btn btn-primary" href="Techer.html">Teacher Login</a></li>
        <li class="nav-item"><a class="btn btn-primary" href="#">Admin</a></li>
        <li class="nav-item"><a class="btn btn-primary" href="#">Caretaker</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- 🔹 Image + Login Wrapper -->
<div class="image-wrapper">

  <!-- Image -->
  <div class="row g-0">
    <div class="col-12">
      <img src="Image/image.png" class="img-fluid w-100 main-img">
    </div>
  </div>

  <!-- 🔹 Login Form (same content) -->
  <div class="overlay-content">

    <div class="container mt-4 mb-5">
      <div class="row justify-content-center">

        <div class="col-12 col-sm-10 col-md-8 col-lg-4">

          <div class="p-4 border rounded-3 bg-light shadow">

            <div class="text-center">
              <h3>Welcome Back</h3>
              <p>Login to your account</p>
            </div>

            <div class="mb-3">
              <label>UserName</label>
              <input type="text" class="form-control">
            </div>

            <div class="mb-3">
              <label>Password</label>
              <input type="password" class="form-control">
            </div>

            <div class="mb-3">
              <label>Department</label>
              <input type="text" class="form-control">
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
              <div>
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">Remember me</label>
              </div>
              <a href="#" class="text-primary small text-decoration-none">Forget password?</a>
            </div>

             <a href="studentpanel.html"><button class="btn btn-primary w-100 mb-3" onclick="saveUser()">Login</button></a>
              

            <p class="text-center">
              <a href="#" class="text-primary text-decoration-none">Create an account</a>
            </p>

          </div>

        </div>

      </div>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
