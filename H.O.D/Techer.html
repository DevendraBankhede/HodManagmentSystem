<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold text-primary" href="index.html">HOD System</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span> 
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto gap-3">
            <li class="nav-item">
                <a class="btn btn-primary" href="Student.html">Student Login</a>
            </li>
            <li class="nav-item">
                <a class="btn btn-primary" href="#">Teacher Login</a>
            </li>
            <li class="nav-item">
                <a class="btn btn-primary" href="#">Admin</a>
            </li>
            <li class="nav-item">
                <a class="btn btn-primary" href="#">Caretaker</a>
            </li>
    </ul>
    </div>
  </div>
</nav>


<div class="image-wrapper">

  <!-- Image -->
  <div class="row g-0">
    <div class="col-12">
      <img src="Image/image1.png" class="img-fluid main-img">
    </div>
  </div>

  <!-- 🔹 Form Section (बस ये wrap किया है) -->
  <div class="overlay-content">

    <div class="container d-flex justify-content-center align-items-center">

      <div class="card shadow col-12 col-sm-10 col-md-7 col-lg-4 px-2">

        <div class="card-body">

          <h3 class="text-center mb-3">Create Account</h3>

          <!-- Radio -->
          <div class="mb-3">
            <label class="fw-bold">Register as:</label><br>

            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="role">
              <label class="form-check-label">Students</label>
            </div>

            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="role">
              <label class="form-check-label">Techers</label>
            </div>

          </div>

          <!-- Inputs -->
          <input type="text" class="form-control mb-3" placeholder="Full Name">
          <input type="email" class="form-control mb-3" placeholder="Email">
          <input type="text" class="form-control mb-3" placeholder="Mobile">
          <input type="password" class="form-control mb-3" placeholder="Password">
          <input type="password" class="form-control mb-3" placeholder="Confirm Password">

          <!-- Checkbox -->
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">
              I agree to <span class="text-primary">Terms & Conditions</span>
            </label>
          </div>

          <!-- Button -->
          <a href="TecherDashBord.html"><button class="btn btn-primary w-100">Register</button></a>

          <!-- Login -->
          <p class="text-center mt-3">
            Already registered? <span class="text-primary">Login</span>
          </p>

        </div>
      </div>

    </div>

  </div>

</div>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
